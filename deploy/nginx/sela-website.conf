# =============================================================================
# Sela-Website Nginx Configuration
# HTTP-only initial config — Certbot will auto-add HTTPS after running setup-ssl.sh
# =============================================================================

server {
    listen 80;
    server_name dardcor.acalypha.my.id;

    root /var/www/sela-website/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 10M;

    # Laravel pretty URLs
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Block dotfiles (except .well-known for Let's Encrypt ACME challenge)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Disable access to sensitive files
    location ~ /\.env {
        deny all;
    }
}
