version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sela_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - sela_network
    ports:
      - "5173:5173" # Port untuk Vite dev server
    # Command ini dijalankan sebagai root untuk mengatasi issue permission saat volume local di-mount (yang mereplace permission container)
    user: root
    command: >
      sh -c "chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache &&
             chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache &&
             composer install --no-interaction &&
             npm install &&
             php-fpm"

  nginx:
    image: nginx:alpine
    container_name: sela_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sela_network
    depends_on:
      - app

networks:
  sela_network:
    driver: bridge